<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Background -->
  <rect width="96" height="96" fill="#1a1a1a" rx="22"/>
  
  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5722;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle -->
  <circle cx="48" cy="48" r="37" fill="url(#grad)"/>
  
  <!-- Inner circle -->
  <circle cx="48" cy="48" r="30" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Numbers -->
  <text x="48" y="58" font-size="24" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">30</text>
</svg>
