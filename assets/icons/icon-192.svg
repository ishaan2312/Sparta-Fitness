<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#1a1a1a" rx="45"/>
  
  <!-- Gradient circle -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5722;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="96" cy="96" r="75" fill="url(#grad)"/>
  
  <!-- Timer display (large centered design) -->
  <circle cx="96" cy="96" r="60" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Timer digit representation -->
  <text x="96" y="115" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">30</text>
  
  <!-- Small tick marks around timer (like a clock) -->
  <g stroke="rgba(255,255,255,0.5)" stroke-width="2">
    <!-- Top tick -->
    <line x1="96" y1="25" x2="96" y2="35"/>
    <!-- Right tick -->
    <line x1="167" y1="96" x2="157" y2="96"/>
    <!-- Bottom tick -->
    <line x1="96" y1="167" x2="96" y2="157"/>
    <!-- Left tick -->
    <line x1="25" y1="96" x2="35" y2="96"/>
  </g>
</svg>
