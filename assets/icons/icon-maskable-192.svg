<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Full background for maskable icon -->
  <rect width="192" height="192" fill="#ff6b35"/>
  
  <!-- Central safe area (Android will apply mask around edges) -->
  <circle cx="96" cy="96" r="60" fill="#ff6b35"/>
  
  <!-- Timer design in center -->
  <circle cx="96" cy="96" r="50" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Numbers -->
  <text x="96" y="115" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial, sans-serif">30</text>
  
  <!-- Decorative ring -->
  <circle cx="96" cy="96" r="55" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
</svg>
